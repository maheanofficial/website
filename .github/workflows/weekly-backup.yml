name: Weekly DB Backup

on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mysql-backup:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      MYSQL_HOST: ${{ secrets.MYSQL_HOST || secrets.CPANEL_HOST }}
      MYSQL_PORT: ${{ secrets.MYSQL_PORT || '3306' }}
      MYSQL_USER: ${{ secrets.MYSQL_USER || secrets.CPANEL_USER }}
      MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD || secrets.CPANEL_PASSWORD }}
      MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
      MYSQL_TABLE_PREFIX: ${{ secrets.MYSQL_TABLE_PREFIX }}
      MYSQL_USERS_TABLE: ${{ secrets.MYSQL_USERS_TABLE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate MySQL secrets
        run: |
          set -euo pipefail
          required=(MYSQL_HOST MYSQL_USER MYSQL_PASSWORD)
          missing=()
          for key in "${required[@]}"; do
            if [ -z "${!key:-}" ]; then
              missing+=("${key}")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing required repository secrets: ${missing[*]}"
            exit 1
          fi

      - name: Prepare output path
        run: |
          set -euo pipefail
          mkdir -p backups
          echo "BACKUP_FILE=backups/mysql-backup-$(date -u +%Y%m%dT%H%M%SZ).json.gz" >> "$GITHUB_ENV"

      - name: Create MySQL backup
        run: node scripts/create-mysql-backup.cjs --out "${BACKUP_FILE}"

      - name: Generate checksum
        run: |
          set -euo pipefail
          sha256sum "${BACKUP_FILE}" | tee "${BACKUP_FILE}.sha256"

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: mysql-backup-${{ github.run_id }}
          path: |
            ${{ env.BACKUP_FILE }}
            ${{ env.BACKUP_FILE }}.sha256
          if-no-files-found: error
          retention-days: 90
