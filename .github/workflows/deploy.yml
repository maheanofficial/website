name: Deploy to cPanel

on:
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production app
        run: npm run build

      - name: Deploy via FTP
        run: |
          echo "::add-mask::k4a9W6]8Xsb;EH"
          export CPANEL_FTP_HOST=122.165.242.4
          export CPANEL_FTP_USER=mahean
          export CPANEL_FTP_PASSWORD='k4a9W6]8Xsb;EH'
          export CPANEL_APP_DIR_FTP=/home/mahean/main_mahean.com
          export CPANEL_HEALTHCHECK_URL=https://www.mahean.com
          python3 scripts/auto-deploy-ftp.py

      - name: Restart app
        run: |
          echo "::add-mask::k4a9W6]8Xsb;EH"
          python3 - <<'EOF'
          import ftplib, io
          with ftplib.FTP() as ftp:
              ftp.connect('122.165.242.4', 21, timeout=30)
              ftp.login('mahean', 'k4a9W6]8Xsb;EH')
              try: ftp.mkd('/home/mahean/main_mahean.com/tmp')
              except: pass
              ftp.storbinary('STOR /home/mahean/main_mahean.com/tmp/restart.txt', io.BytesIO(b''))
          print('App restart triggered.')
          EOF
