name: Uptime Monitor

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      UPTIME_CHECK_URL: ${{ secrets.UPTIME_CHECK_URL }}

    steps:
      - name: Resolve check URL
        run: |
          set -euo pipefail
          if [ -n "${UPTIME_CHECK_URL:-}" ]; then
            echo "CHECK_URL=${UPTIME_CHECK_URL}" >> "$GITHUB_ENV"
          else
            echo "CHECK_URL=https://www.mahean.com/healthz" >> "$GITHUB_ENV"
          fi

      - name: Probe health endpoint
        id: probe
        run: |
          set +e
          BODY_FILE="$(mktemp)"
          HTTP_CODE="$(curl --silent --show-error --location --max-time 20 --output "${BODY_FILE}" --write-out '%{http_code}' "${CHECK_URL}")"
          CURL_EXIT=$?
          BODY_TEXT="$(tr -d '\r\n' < "${BODY_FILE}" | head -c 160)"

          if [ "${CURL_EXIT}" -eq 0 ] && [ "${HTTP_CODE}" = "200" ] && [ "${BODY_TEXT}" = "ok" ]; then
            echo "status=up" >> "$GITHUB_OUTPUT"
            {
              echo 'details<<EOF'
              echo "HTTP 200 with expected body 'ok'."
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          else
            if [ -z "${BODY_TEXT}" ]; then
              BODY_TEXT="<empty>"
            fi
            echo "status=down" >> "$GITHUB_OUTPUT"
            {
              echo 'details<<EOF'
              echo "curl_exit=${CURL_EXIT}, http=${HTTP_CODE}, body=${BODY_TEXT}"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          fi
          exit 0

      - name: Open/close incident issue
        id: incident
        uses: actions/github-script@v7
        env:
          CHECK_URL: ${{ env.CHECK_URL }}
          CHECK_STATUS: ${{ steps.probe.outputs.status }}
          CHECK_DETAILS: ${{ steps.probe.outputs.details }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const nowIso = new Date().toISOString();
            const checkUrl = process.env.CHECK_URL;
            const status = process.env.CHECK_STATUS;
            const details = process.env.CHECK_DETAILS || '';
            const incidentTitle = `[Uptime] ${checkUrl} is DOWN`;

            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              per_page: 100
            });
            const incident = openIssues.find((issue) => issue.title === incidentTitle && !issue.pull_request);

            let transition = 'none';
            let issueNumber = '';

            if (status === 'down') {
              if (incident) {
                transition = 'down_existing';
                issueNumber = String(incident.number);
              } else {
                const created = await github.rest.issues.create({
                  owner,
                  repo,
                  title: incidentTitle,
                  body: [
                    `Detected at: ${nowIso}`,
                    `Check URL: ${checkUrl}`,
                    '',
                    'Latest probe details:',
                    `- ${details}`
                  ].join('\n')
                });
                transition = 'down_new';
                issueNumber = String(created.data.number);
              }
            } else if (status === 'up' && incident) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: incident.number,
                body: `Recovered at ${nowIso}. Health endpoint returned expected response.`
              });
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: incident.number,
                state: 'closed'
              });
              transition = 'recovered';
              issueNumber = String(incident.number);
            }

            core.setOutput('transition', transition);
            core.setOutput('issue_number', issueNumber);

      - name: Fail workflow when site is down
        if: ${{ steps.probe.outputs.status == 'down' }}
        env:
          CHECK_DETAILS: ${{ steps.probe.outputs.details }}
        run: |
          echo "::error::Uptime check failed for ${CHECK_URL} (${CHECK_DETAILS})"
          exit 1
